<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Glucolit is a glucose community for tracking, learning, and sharing better metabolic habits."
    >
    <title>Glucolit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="copy">
          <p class="eyebrow">Private beta is warming up</p>
          <h1 id="page-title">Glucolit</h1>
          <p class="lead">
            A glucose community for daily readings, shared routines, and practical experiments that make metabolic health easier to understand.
          </p>
          <div class="actions" aria-label="Project status">
            <a class="button primary" href="mailto:hello@xuemusi.com">Join the waitlist</a>
            <span class="status">Launching on Cloudflare</span>
          </div>
        </div>

        <div class="product-panel" aria-label="Glucose tracking preview">
          <div class="panel-top">
            <div>
              <p class="panel-kicker">Today</p>
              <h2>104 mg/dL</h2>
            </div>
            <span class="trend">Stable</span>
          </div>

          <div class="chart" aria-hidden="true">
            <span class="range high">160</span>
            <span class="range low">70</span>
            <div class="band"></div>
            <div class="line"></div>
            <div class="dot dot-one"></div>
            <div class="dot dot-two"></div>
            <div class="dot dot-three"></div>
          </div>

          <div class="metric-grid">
            <div>
              <span>Fasting</span>
              <strong>92</strong>
            </div>
            <div>
              <span>After meal</span>
              <strong>126</strong>
            </div>
            <div>
              <span>Check-ins</span>
              <strong>7</strong>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
