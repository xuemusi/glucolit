<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="GLUCOLIT 是面向糖尿病前期人群的 AI 生活方式干预行动陪跑 H5。"
    >
    <title>GLUCOLIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;800&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/styles.css?v=20260704-report-action-v1">
  </head>
  <body>
    <div class="app-frame">
      <header class="app-header">
        <div>
          <p class="eyebrow">AI metabolic companion</p>
          <h1>GLUCOLIT</h1>
        </div>
        <button class="ghost-button" id="resetUser" type="button">切换</button>
      </header>

      <main id="app" class="screen" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="nav-button active" type="button" data-view="home">首页</button>
        <button class="nav-button" type="button" data-view="tools">AI</button>
        <button class="nav-button" type="button" data-view="actions">行动</button>
        <button class="nav-button" type="button" data-view="profile">我的</button>
        <button class="nav-button" type="button" data-view="content">科普</button>
      </nav>
    </div>

    <dialog id="registerDialog" class="register-dialog">
      <form id="registerForm" method="dialog" class="register-card">
        <p class="eyebrow">开始使用</p>
        <h2>用手机号保存记录</h2>
        <p class="muted">当前不会发送短信验证码。手机号仅用于保存你的健康记录和打卡状态。</p>
        <label class="field">
          <span>手机号</span>
          <input id="phoneInput" name="phone" inputmode="tel" autocomplete="tel" placeholder="13800138000" required>
        </label>
        <button class="primary-button" type="submit">进入 GLUCOLIT</button>
        <p class="form-error" id="registerError"></p>
      </form>
    </dialog>

    <script type="module" src="/app.js?v=20260704-report-action-v1"></script>
  </body>
</html>
